# Mini SOC — Kibana config.

server.name: soc-kibana
server.host: "0.0.0.0"            # reachable from outside Docker
server.publicBaseUrl: "http://localhost:5601"

# Elasticsearch is reachable via the service name on the ELK Docker network.
elasticsearch.hosts: ["http://elasticsearch:9200"]

# Disable telemetry in a lab.
telemetry.enabled: false
telemetry.optIn: false

# Friendly defaults
i18n.locale: "en"

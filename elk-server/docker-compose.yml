# Mini SOC — ELK stack (single-node, no TLS, lab-only).
#
# Versions and JVM options live in .env.
# Before first start:   sudo sysctl -w vm.max_map_count=262144
# Start:                docker compose up -d
# Stop (keep data):     docker compose down
# Reset everything:     docker compose down -v        # ⚠ deletes all indexed data

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: soc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false          # lab only — do not expose to untrusted networks
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
      - cluster.name=mini-soc
      - node.name=soc-es-1
    ulimits:
      memlock: { soft: -1, hard: -1 }         # required so ES can lock its heap
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"' >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: soc-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=${LOGSTASH_JAVA_OPTS}
      - xpack.monitoring.enabled=false
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9600 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: soc-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  esdata:
    driver: local

networks:
  elk:
    driver: bridge
    ipam:
      config:
        - subnet: ${ELK_NETWORK_SUBNET}

# Mini SOC — Elasticsearch output.
# Route every event to soc-<type>-YYYY.MM.dd, where <type> is set in filters.conf.

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "soc-%{[@metadata][soc_type]}-%{+YYYY.MM.dd}"
    # No auth / TLS — lab only.
  }

  # Uncomment for pipeline debugging:
  # stdout { codec => rubydebug { metadata => true } }
}

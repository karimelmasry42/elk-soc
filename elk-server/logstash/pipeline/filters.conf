# Mini SOC — parsing, tagging, and severity enrichment.
#
# Sets [@metadata][soc_type] so elasticsearch-output.conf can route to
# soc-<type>-YYYY.MM.dd. Attaches soc.severity (info/warning/critical) and
# soc.attack.web on suspicious DVWA requests.

filter {

  # ---------------------------------------------------------------------------
  # 1) Classify the event source and set [@metadata][soc_type]
  # ---------------------------------------------------------------------------
  if [agent][type] == "filebeat" {
    if [event][module] == "system" {
      mutate { add_field => { "[@metadata][soc_type]" => "system" } }
    } else if [event][module] == "auditd" {
      mutate { add_field => { "[@metadata][soc_type]" => "auditd" } }
    } else if "dvwa" in [tags] or [fields][log_source] == "dvwa" {
      mutate { add_field => { "[@metadata][soc_type]" => "dvwa" } }
    } else {
      mutate { add_field => { "[@metadata][soc_type]" => "filebeat" } }
    }
  } else if [agent][type] == "packetbeat" {
    mutate { add_field => { "[@metadata][soc_type]" => "packetbeat" } }
  } else if [agent][type] == "winlogbeat" {
    mutate { add_field => { "[@metadata][soc_type]" => "winlogbeat" } }
  } else {
    mutate { add_field => { "[@metadata][soc_type]" => "other" } }
  }

  # Default severity — overridden below per event type.
  mutate { add_field => { "[soc][severity]" => "info" } }

  # ---------------------------------------------------------------------------
  # 2) Filebeat — system module — sshd login events
  # ---------------------------------------------------------------------------
  if [@metadata][soc_type] == "system" {
    if [message] =~ "Failed password" {
      grok {
        match => {
          "message" => "Failed password for (invalid user )?%{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:int}"
        }
        tag_on_failure => ["_grokparsefailure_sshd_failed"]
      }
      mutate {
        replace => { "[soc][severity]" => "warning" }
        add_tag => ["soc.auth.failed"]
      }
    } else if [message] =~ "Accepted (password|publickey)" {
      grok {
        match => {
          "message" => "Accepted (password|publickey) for %{USERNAME:[user][name]} from %{IP:[source][ip]} port %{NUMBER:[source][port]:int}"
        }
        tag_on_failure => ["_grokparsefailure_sshd_accepted"]
      }
      mutate {
        replace => { "[soc][severity]" => "info" }
        add_tag => ["soc.auth.success"]
      }
    }
  }

  # ---------------------------------------------------------------------------
  # 3) Filebeat — auditd — already JSON-structured by the module.
  #    Elevate severity on execve of shells from unusual parents, etc.
  # ---------------------------------------------------------------------------
  if [@metadata][soc_type] == "auditd" {
    if [auditd][data][syscall] == "execve" {
      mutate { add_tag => ["soc.process.exec"] }
    }
  }

  # ---------------------------------------------------------------------------
  # 4) DVWA — Apache combined access log
  # ---------------------------------------------------------------------------
  if [@metadata][soc_type] == "dvwa" {
    grok {
      match => {
        "message" => "%{IPORHOST:[source][ip]} - %{DATA:[user][name]} \[%{HTTPDATE:[event][created]}\] \"%{WORD:[http][request][method]} %{DATA:[url][original]} HTTP/%{NUMBER:[http][version]}\" %{NUMBER:[http][response][status_code]:int} (?:%{NUMBER:[http][response][body][bytes]:int}|-) \"%{DATA:[http][request][referrer]}\" \"%{DATA:[user_agent][original]}\""
      }
      tag_on_failure => ["_grokparsefailure_apache"]
    }

    # Flag anything that looks like SQLi / XSS in the URL.
    if [url][original] =~ /(?i)(union\s+select|or\s+1=1|'--|<script|%3Cscript|SELECT.+FROM)/ {
      mutate {
        add_tag => ["soc.attack.web"]
        replace => { "[soc][severity]" => "critical" }
      }
    }
  }

  # ---------------------------------------------------------------------------
  # 5) Winlogbeat — Sysmon events
  # ---------------------------------------------------------------------------
  if [@metadata][soc_type] == "winlogbeat" {
    if [winlog][channel] == "Microsoft-Windows-Sysmon/Operational" {
      if [winlog][event_id] == 1 {
        mutate { add_tag => ["soc.sysmon.process_create"] }
        mutate { replace => { "[soc][severity]" => "info" } }
      } else if [winlog][event_id] == 3 {
        mutate { add_tag => ["soc.sysmon.network_connect"] }
        mutate { replace => { "[soc][severity]" => "warning" } }
      } else if [winlog][event_id] == 11 {
        mutate { add_tag => ["soc.sysmon.file_create"] }
        mutate { replace => { "[soc][severity]" => "warning" } }
      } else if [winlog][event_id] == 22 {
        mutate { add_tag => ["soc.sysmon.dns_query"] }
      }
    }

    # Security log — failed logins are interesting.
    if [winlog][channel] == "Security" {
      if [winlog][event_id] == 4625 {
        mutate {
          add_tag => ["soc.auth.failed"]
          replace => { "[soc][severity]" => "warning" }
        }
      } else if [winlog][event_id] == 4688 {
        mutate { add_tag => ["soc.process.exec"] }
      }
    }
  }

  # ---------------------------------------------------------------------------
  # 6) Packetbeat is already structured — just propagate severity defaults.
  # ---------------------------------------------------------------------------
}
